<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV — Fabian Corsalini</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    font-family: 'Outfit', sans-serif;
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Navbar */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 1.2rem 5%;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-size: 1.2rem; font-weight: 700; color: white;
    text-decoration: none;
  }
  .logo span { color: #ff5500; }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 20px; border: 1px solid rgba(255,255,255,0.12);
    border-radius: 100vw; color: rgba(255,255,255,0.6);
    text-decoration: none; font-size: 13px; font-weight: 600;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: #ff5500; color: #ff5500; }
  .dl-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 20px; background: #ff5500;
    border-radius: 100vw; color: white;
    text-decoration: none; font-size: 13px; font-weight: 700;
    transition: opacity 0.2s;
  }
  .dl-btn:hover { opacity: 0.85; }

  /* Main content */
  .cv-container {
    flex: 1;
    padding: 100px 5% 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .cv-header {
    text-align: center;
    margin-bottom: 8px;
  }
  .cv-header h1 {
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }
  .cv-header h1 span { color: #ff5500; }

  /* PDF embed wrapper */
  .pdf-wrapper {
    width: 100%;
    max-width: 860px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    background: #1a1a1a;
  }

  .pdf-embed {
    width: 100%;
    height: 90vh;
    display: block;
    border: none;
  }

  /* Fallback message */
  .pdf-fallback {
    display: none;
    padding: 60px 40px;
    text-align: center;
  }
  .pdf-fallback p {
    color: rgba(255,255,255,0.4);
    font-size: 14px;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="logo">Fabian<span>.</span></a>
  <div class="nav-right">
    <a href="index.html" class="back-btn">← Back to portfolio</a>
    <a href="Fabian-Corsalini-CV.pdf" download class="dl-btn">↓ Download PDF</a>
  </div>
</nav>

<div class="cv-container">
  <div class="cv-header">
    <h1>Curriculum Vitae — <span>Fabian Corsalini</span></h1>
  </div>

  <div class="pdf-wrapper">
    <iframe
      class="pdf-embed"
      src="Fabian-Corsalini-CV.pdf"
      title="Fabian Corsalini CV"
    ></iframe>
  </div>
</div>

</body>
</html>
